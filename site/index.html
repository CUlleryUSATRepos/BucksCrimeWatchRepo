<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bucks County CrimeWatch Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #1f2933;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: #0f172a;
      color: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
    }

    .hero p {
      margin: 0;
      line-height: 1.5;
      color: #dbe2ea;
    }

    .summary {
      display: inline-block;
      margin-top: 16px;
      background: #1e293b;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin: 0 0 8px 0;
      font-size: 1.2rem;
    }

    .meta {
      font-size: 0.95rem;
      color: #52606d;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .summary-text {
      margin-bottom: 12px;
      line-height: 1.5;
    }

    a.read-more {
      display: inline-block;
      text-decoration: none;
      background: #1d4ed8;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: bold;
    }

    a.read-more:hover {
      background: #1e40af;
    }

    .empty {
      background: white;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>Bucks County CrimeWatch Dashboard</h1>
      <p>Latest CrimeWatch posts published today from Bucks County agencies.</p>
      <div class="summary" id="post-count">Loading posts...</div>
    </div>

    <div id="posts-container"></div>

    <div class="footer-note">
      Data source: Bucks County agency CrimeWatch pages. Updated from scripts/data/today_posts.csv.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const csvFile = "scripts/data/today_posts.csv";
    const container = document.getElementById("posts-container");
    const postCount = document.getElementById("post-count");

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderPosts(rows) {
      container.innerHTML = "";

      if (!rows.length) {
        postCount.textContent = "0 posts found today";
        container.innerHTML = `
          <div class="empty">
            <h2>No posts found for today.</h2>
            <p>Check back later for new updates.</p>
          </div>
        `;
        return;
      }

      postCount.textContent = `${rows.length} post${rows.length === 1 ? "" : "s"} found today`;

      rows.forEach(row => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h2>${escapeHtml(row.title || "Untitled Post")}</h2>
          <div class="meta">
            <strong>Agency:</strong> ${escapeHtml(row.agency_name || "")}<br>
            <strong>Date:</strong> ${escapeHtml(row.date || "")}
          </div>
          <div class="summary-text">${escapeHtml(row.summary || "")}</div>
          <a class="read-more" href="${escapeHtml(row.link || "#")}" target="_blank" rel="noopener noreferrer">Read more</a>
        `;

        container.appendChild(card);
      });
    }

    Papa.parse(csvFile, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        renderPosts(results.data);
      },
      error: function(error) {
        postCount.textContent = "Error loading posts";
        container.innerHTML = `
          <div class="empty">
            <h2>Could not load today_posts.csv</h2>
            <p>${escapeHtml(error.message || "Unknown error")}</p>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
